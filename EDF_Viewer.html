<meta name="viewport" content="width=device-width, initial-scale=1"><title>EDF Viewer — EP</title>
<style>
 :root{--bg:#0f1115;--panel:#1a1d24;--ink:#e7eaf0;--muted:#9aa3b2;--accent:#4ea1ff;--grid:#2a2f3a;--cal:#ffcc44;}

 .bar{display:flex;flex-wrap:wrap;gap:8px 12px;align-items:center;padding:7px 12px;background:var(--panel);border-bottom:1px solid #000;}
 .bar .g{display:flex;gap:5px;align-items:center;} .bar label{color:var(--muted);}
 button,select,input[type=text]{background:#262b34;color:var(--ink);border:1px solid #3a4150;border-radius:6px;padding:5px 8px;font:inherit;cursor:pointer;}
 input[type=text]{width:46px;cursor:text;} button:hover{background:#2f3640;} button.on{background:var(--accent);border-color:var(--accent);color:#04122a;}
 button.primary{background:#2a7d46;border-color:#2a7d46;color:#eafff0;} button.primary:hover{background:#33914f;}
 input[type=range]{width:240px;vertical-align:middle;} .sep{width:1px;height:22px;background:#3a4150;}
 #wrap{flex:1;position:relative;overflow:hidden;} canvas{display:block;width:100%;height:100%;background:var(--bg);cursor:crosshair;}
 #status{padding:6px 12px;background:var(--panel);border-top:1px solid #000;color:var(--muted);display:flex;gap:16px;flex-wrap:wrap;}
 #status b{color:var(--ink);} .pill{background:#262b34;border:1px solid #3a4150;border-radius:20px;padding:2px 10px;}

 <div class="bar">
  <div class="g"><input type="file" id="file" accept=".edf,.bdf"></div>

  <div class="g" style="flex:1;min-width:200px;"><button id="back">⟨</button><input type="range" id="scrub" min="0" max="1000" value="0"><button id="fwd">⟩</button></div>
  <div class="g"><button id="caliper">Caliper</button><button id="png">PNG</button></div>
 </div>
 <div class="bar">
  <div class="g"><label>Display filter</label><select id="filt"><option value="raw">Raw</option><option value="base">Baseline removed</option><option value="band" selected>Bandpass</option></select></div>

 </div>

"use strict";
// ---------- EDF parser (validated == pyedflib) ----------
function parseEDF(buf){

// display filter applied to a window (with padding for MA context)

    seg=seg.subarray(pad);
    let mn=Infinity,mx=-Infinity;const stride=Math.max(1,Math.floor(seg.length/2000));
    for(let k=0;k<seg.length;k+=stride){if(seg[k]<mn)mn=seg[k];if(seg[k]>mx)mx=seg[k];}
    const span=(mx-mn)||1;let g=autoGain?(L.laneH*0.8)/span:(gainMul[sig.index]||(L.laneH*0.8)/span);
    gainMul[sig.index]=g;const mid=(mn+mx)/2;
    ctx.strokeStyle=sig.label.toLowerCase().includes("ecg")?"#7ee0a0":css("--accent");
    ctx.beginPath();const px2k=seg.length/L.plotW;
    if(px2k>1.5){for(let px=0;px<L.plotW;px++){const a=Math.floor(px*px2k),b=Math.min(seg.length-1,Math.floor((px+1)*px2k));
      let lo=Infinity,hi=-Infinity;for(let k=a;k<=b;k++){if(seg[k]<lo)lo=seg[k];if(seg[k]>hi)hi=seg[k];}
      const x=L.padL+px;ctx.moveTo(x,yMid-(hi-mid)*g);ctx.lineTo(x,yMid-(lo-mid)*g);}}
    else{for(let k=0;k<seg.length;k++){const x=L.padL+k/(seg.length-1)*L.plotW;const y=yMid-(seg[k]-mid)*g;if(k===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);}}
    ctx.stroke();
    // markers only on the ECG channel that was analyzed
    if(sig.index===ecgIdx){
      drawMarks(R,"#ff5d6c",yTop+10,L,"R");
      drawMarks(P,"#46c3ff",yTop+22,L,"P");
      drawMarks(T,"#ffae42",yTop+L.laneH-8,L,"T");
    }
  });
  // axis labels
  ctx.fillStyle=css("--muted");ctx.font="10px system-ui";
  const step=winSec<=10?1:(winSec<=60?5:(winSec<=300?30:60));
  for(let t=Math.ceil(t0);t<t0+winSec;t+=step){const x=L.padL+(t-t0)/winSec*L.plotW;ctx.fillText(fmtTime(t),x+2,L.H-4);}
  // caliper
  if(calPts.length){ctx.strokeStyle=css("--cal");ctx.setLineDash([4,3]);
    calPts.forEach(p=>{if(p.t<t0||p.t>t0+winSec)return;const x=L.padL+(p.t-t0)/winSec*L.plotW;ctx.beginPath();ctx.moveTo(x,L.padT);ctx.lineTo(x,L.H-12);ctx.stroke();});ctx.setLineDash([]);}
  // drag-zoom rubber band
  if(dragging&&dragX0!=null&&dragX1!=null){ctx.fillStyle="rgba(78,161,255,0.18)";const x=Math.min(dragX0,dragX1);ctx.fillRect(x,L.padT,Math.abs(dragX1-dragX0),L.H-L.padT-L.padB);}
}
function drawMarks(times,color,y,L,lbl){ctx.fillStyle=color;ctx.strokeStyle=color;
  for(const tt of times){if(tt<t0||tt>t0+winSec)continue;const x=L.padL+(tt-t0)/winSec*L.plotW;ctx.beginPath();ctx.arc(x,y,3,0,7);ctx.fill();}}

function fmtTime(s){s=Math.max(0,s);const hh=Math.floor(s/3600),mm=Math.floor((s%3600)/60),ss=s%60;
  const ssS=winSec<=10?ss.toFixed(1):Math.floor(ss).toString().padStart(2,"0");
  return hh>0?`${hh}:${mm.toString().padStart(2,"0")}:${ssS.padStart(2,"0")}`:`${mm}:${ssS.padStart(2,"0")}`;}

// ---------- analysis ----------
function analyze(){
  if(!edf||ecgIdx==null)return;
  const sig=plotSignals.find(s=>s.index===ecgIdx);if(!sig)return;
  const fs=sig.fs;const kA=Math.max(0,Math.floor(t0*fs)),kB=Math.min(sig.nSamples,Math.ceil((t0+winSec)*fs));
  if(kB-kA>500000){setStatus("Zoom in to ≤ ~"+Math.round(500000/fs)+" s to analyze.");return;}
  const ecg=getSegment(sig,kA,kB);
  setStatus("Analyzing "+(winSec.toFixed(0))+" s …");
  setTimeout(()=>{
    const q=EDFDetect.detectQRS(ecg,fs);
    const off=kA/fs;
    R=q.peaks.map(p=>off+p/fs);RR=q.rr_ms.slice();
    let pres;
    if(pMode==="independent")pres=EDFDetect.detectPIndependent(ecg,fs,q.peaks);
    else pres=EDFDetect.detectPCoupled(ecg,fs,q.peaks);
    P=pres.peaks.map(p=>off+p/fs);PP=pres.pp_ms.slice();PR=pres.pr_ms?pres.pr_ms.slice():[];
    const tr=EDFDetect.detectT(ecg,fs,q.peaks);T=tr.peaks.map(p=>off+p/fs);
    reportStats();draw();
  },20);
}
function stats(a){if(!a.length)return null;const s=Float64Array.from(a);const m=a.reduce((x,y)=>x+y,0)/a.length;
  return {n:a.length,mean:m,median:EDFDetect.median(s),min:Math.min(...a),max:Math.max(...a)};}
function reportStats(){
  const r=stats(RR),p=stats(PP);
  let html="";
  if(r)html+=`<b>RR</b>: ${R.length} beats · mean ${r.mean.toFixed(0)} · median ${r.median.toFixed(0)} ms · HR ${(60000/r.median).toFixed(0)} bpm`;
  else html+="No QRS detected";
  $("rrInfo").innerHTML=html;
  let h2="";
  if(p)h2=`<b>PP</b>: ${P.length} P-waves · mean ${p.mean.toFixed(0)} · median ${p.median.toFixed(0)} ms · atrial ${(60000/p.median).toFixed(0)} bpm`;
  if(PR&&PR.length){const pr=stats(PR);h2+=`  ·  <b>PR</b> mean ${pr.mean.toFixed(0)} ms`;}
  $("ppInfo").innerHTML=h2;
}
function clearAnalysis(){R=[];P=[];T=[];RR=[];PP=[];PR=[];$("rrInfo").textContent="";$("ppInfo").textContent="";draw();}

function exportCSV(){
  let s="# EDF Viewer beat measurements\n# generated "+new Date().toISOString()+"\n";
  s+="\n# QRS / R-wave (RR = interval from previous R)\nbeat,R_time_s,RR_ms,T_time_s\n";
  for(let i=0;i<R.length;i++)s+=`${i+1},${R[i].toFixed(4)},${i>0?Math.round((R[i]-R[i-1])*1000):""},${T[i]!=null?T[i].toFixed(4):""}\n`;
  s+="\n# P-wave (PP = interval from previous P; PR present in Conducted mode)\np_index,P_time_s,PP_ms"+(PR.length?",PR_ms":"")+"\n";
  for(let i=0;i<P.length;i++)s+=`${i+1},${P[i].toFixed(4)},${i>0?Math.round((P[i]-P[i-1])*1000):""}${PR.length?(","+(PR[i]!=null?Math.round(PR[i]):"")):""}\n`;
  const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([s],{type:"text/csv"}));
  a.download="beat_measurements.csv";a.click();
}

// ---------- UI wiring ----------
function setStatus(m){$("fileInfo").textContent=m;}
$("file").addEventListener("change",e=>{const f=e.target.files[0];if(!f)return;const fr=new FileReader();
  setStatus("Loading "+f.name+" …");
  fr.onload=()=>{try{edf=parseEDF(fr.result);plotSignals=edf.signals.filter(s=>!s.isAnnotation&&s.spr>0);
    t0=0;winSec=parseFloat($("win").value);gainMul={};clearAnalysis();
    const sel=$("ecg");sel.innerHTML="";plotSignals.forEach(s=>{const o=document.createElement("option");o.value=s.index;o.textContent=s.label;sel.appendChild(o);});
    const e1=plotSignals.find(s=>s.label.toLowerCase().includes("ecg"))||plotSignals[0];ecgIdx=e1?e1.index:null;if(ecgIdx!=null)sel.value=ecgIdx;
    $("fileInfo").innerHTML=`<b>${f.name}</b> · ${edf.signals.length} sig · ${edf.durationSec.toFixed(1)} s · start ${edf.startDate} ${edf.startTime}`;
    updateScrub();fitCanvas();}catch(err){setStatus("Could not read EDF: "+err.message);console.error(err);}};
  fr.readAsArrayBuffer(f);});
$("win").addEventListener("change",()=>{const c=t0+winSec/2;winSec=parseFloat($("win").value);t0=clamp(c-winSec/2);updateScrub();draw();});
$("filt").addEventListener("change",draw);$("hp").addEventListener("change",draw);$("lp").addEventListener("change",draw);$("notch").addEventListener("change",draw);
$("gUp").onclick=()=>{autoGain=false;plotSignals.forEach(s=>gainMul[s.index]=(gainMul[s.index]||1)*1.3);draw();};
$("gDn").onclick=()=>{autoGain=false;plotSignals.forEach(s=>gainMul[s.index]=(gainMul[s.index]||1)/1.3);draw();};
$("gAuto").onclick=()=>{autoGain=true;draw();};
$("back").onclick=()=>{t0=clamp(t0-winSec*0.5);updateScrub();draw();};
$("fwd").onclick=()=>{t0=clamp(t0+winSec*0.5);updateScrub();draw();};
$("scrub").addEventListener("input",()=>{if(!edf)return;t0=clamp($("scrub").value/1000*Math.max(0,edf.durationSec-winSec));draw();});
$("caliper").onclick=()=>{caliperMode=!caliperMode;calPts=[];$("caliper").classList.toggle("on",caliperMode);$("calInfo").textContent=caliperMode?"Caliper: click two points":"";draw();};
$("ecg").addEventListener("change",()=>{ecgIdx=parseInt($("ecg").value,10);});
$("pmode").addEventListener("change",()=>{pMode=$("pmode").value;});
$("analyze").onclick=analyze;$("clear").onclick=clearAnalysis;$("csv").onclick=exportCSV;
$("png").onclick=()=>{const a=document.createElement("a");a.href=cv.toDataURL("image/png");a.download="edf_view.png";a.click();};

// mouse: caliper click OR drag-to-zoom
cv.addEventListener("mousedown",e=>{if(!edf||caliperMode)return;dragging=true;dragX0=e.clientX-cv.getBoundingClientRect().left;dragX1=dragX0;});
cv.addEventListener("mousemove",e=>{if(dragging){dragX1=e.clientX-cv.getBoundingClientRect().left;draw();}});
window.addEventListener("mouseup",()=>{if(!dragging)return;dragging=false;const L=layout();
  if(dragX0!=null&&dragX1!=null&&Math.abs(dragX1-dragX0)>6){
    const f0=(Math.min(dragX0,dragX1)-L.padL)/L.plotW,f1=(Math.max(dragX0,dragX1)-L.padL)/L.plotW;
    const nt0=t0+Math.max(0,f0)*winSec,nt1=t0+Math.min(1,f1)*winSec;
    winSec=Math.max(0.2,nt1-nt0);t0=clamp(nt0);$("win").value=nearestWin(winSec);updateScrub();}
  dragX0=dragX1=null;draw();});
cv.addEventListener("click",e=>{if(!edf||!caliperMode)return;const L=layout();const x=e.clientX-cv.getBoundingClientRect().left;
  const t=t0+(x-L.padL)/L.plotW*winSec;if(t<t0||t>t0+winSec)return;calPts.push({t});if(calPts.length>2)calPts=[calPts[calPts.length-1]];
  if(calPts.length===2){const dt=Math.abs(calPts[1].t-calPts[0].t);$("calInfo").innerHTML=`Δt <b>${(dt*1000).toFixed(1)} ms</b> · <b>${(60/dt).toFixed(1)}</b> bpm`;}
  else $("calInfo").textContent="Caliper: click second point";draw();});
window.addEventListener("keydown",e=>{if(!edf)return;
  if(e.key==="ArrowLeft"){t0=clamp(t0-winSec*0.25);updateScrub();draw();}
  if(e.key==="ArrowRight"){t0=clamp(t0+winSec*0.25);updateScrub();draw();}});

function clamp(t){const mx=Math.max(0,edf?edf.durationSec-winSec:0);return Math.min(mx,Math.max(0,t));}
function updateScrub(){const mx=Math.max(0,edf?edf.durationSec-winSec:0);$("scrub").value=mx>0?Math.round(t0/mx*1000):0;}
function nearestWin(w){const opts=[2,5,10,30,60,300];let best=opts[0];for(const o of opts)if(Math.abs(o-w)<Math.abs(best-w))best=o;return best;}

</script></body></html>
